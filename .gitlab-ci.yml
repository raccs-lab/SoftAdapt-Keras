deploy-to-pypi:
  stage: deploy
  environment: release
  id_tokens:
    PYPI_ID_TOKEN:
      aud: pypi
  before_script:
    - git config --global user.email "${GITLAB_USER_EMAIL}" && git config --global user.name "${GITLAB_USER_NAME}"
    - git fetch origin main
    - git reset --hard origin/main
  script:
    - uvx --from commitizen cz bump --no-verify || exit $?
    - uv build
    - uv publish
    - git push origin main:$CI_COMMIT_REF_NAME
    - echo "#!/bin/sh" >> variables
    - TAG=$(git describe --tags --abbrev=0)
    - echo "export TAG='$TAG'" >> variables
    - git push origin $TAG
  rules:
    - if: $CI_COMMIT_BRANCH == 'main' && $CI_PIPELINE_SOURCE != 'merge_request_event'      # Run for all changes to the default branch
  artifacts:
    paths:
      - variables
      - dist/*
  allow_failure:
    exit_codes:
      - 21

deploy-to-testpypi:
  stage: deploy
  environment: release
  id_tokens:
    PYPI_ID_TOKEN:
      aud: testpypi
  before_script:
    - git config --global user.email "${GITLAB_USER_EMAIL}" && git config --global user.name "${GITLAB_USER_NAME}"
    - git fetch origin dev
    - git reset --hard origin/dev
  script:
    - uvx --from commitizen cz bump --no-verify -pr rc || exit $?
    - uv build
    - uv publish --index testpypi
    - git push origin dev:$CI_COMMIT_REF_NAME
    - echo "#!/bin/sh" >> variables
    - TAG=$(git describe --tags --abbrev=0)
    - echo "export TAG='$TAG'" >> variables
    - git push origin $TAG
  rules:
    - if: $CI_COMMIT_BRANCH == 'dev' && $CI_PIPELINE_SOURCE != 'merge_request_event'      # Run for all changes to the default branch
  artifacts:
    paths:
      - variables
      - dist/*
  allow_failure:
    exit_codes:
      - 3


## DOCS Pipelines

build-docs:
  stage: build
  script:
    - uv run --dev --with pdoc $CI_PROJECT_DIR/scripts/make_docs.py
  variables:
    PDOC_ALLOW_EXEC: 1
  artifacts:
    paths:
      - docs/**/*.md
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == 'main' && $CI_PIPELINE_SOURCE != 'merge_request_event'      # Run for all changes to the default branch

deploy-docs:
  stage: deploy
  variables:
    WIKI_URL: ${CI_SERVER_PROTOCOL}://project_${CI_PROJECT_ID}_bot:${WIKI_WRITE_TOKEN}@${CI_SERVER_HOST}:${CI_SERVER_PORT}/${CI_PROJECT_PATH}.wiki.git
  dependencies:
    - build-docs
  needs:
    - job: build-docs
  script:
    - cd ..
    - git clone "${WIKI_URL}"
    - git -C ${CI_PROJECT_NAME}.wiki config user.name "$GITLAB_USER_NAME"
    - git -C ${CI_PROJECT_NAME}.wiki config user.email "$GITLAB_USER_EMAIL"
    - cp -r ${CI_PROJECT_NAME}/docs/* ${CI_PROJECT_NAME}.wiki
    - '[ -z "$(git -C ${CI_PROJECT_NAME}.wiki status --porcelain)" ] && exit 0'
    - git -C ${CI_PROJECT_NAME}.wiki add .
    - git -C ${CI_PROJECT_NAME}.wiki commit -am "Updated triggered from $CI_COMMIT_SHORT_SHA $CI_COMMIT_MESSAGE" && git -C ${CI_PROJECT_NAME}.wiki push origin master || true
  rules:
    - if: $CI_COMMIT_BRANCH == 'main' && $CI_PIPELINE_SOURCE != 'merge_request_event'      # Run for all changes to the default branch

