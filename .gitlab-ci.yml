stages:
  - .pre
  - build
  - test
  - deploy
  - docs
  - .post

variables:
  UV_VERSION: "0.11.24"
  PYTHON_VERSION: "3.12"
  BASE_LAYER: trixie
  UV_LINK_MODE: copy
  UV_CACHE_DIR: .uv-cache
  KERAS_BACKEND: "torch"
  API_IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME

include:
  - component: gitlab.com/components/secret-detection/secret-detection@2.3.0
    inputs:
      enable_mr_pipelines: true
      stage: .pre

default:
  image: ghcr.io/astral-sh/uv:python$PYTHON_VERSION-$BASE_LAYER
  cache:
    - key:
        files:
          - pyproject.toml
      paths:
        - $UV_CACHE_DIR
  after_script:
    - uv cache prune --ci

test-package:
  stage: test
  script:
    - uv run --group test pytest --cov-report=xml:cov.xml --junitxml=report.xml
  coverage: '/TOTAL.*? (100(?:\.0+)?\%\\|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: cov.xml
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - src/softadapt/**/*
        - tests/**/*
    - if: $CI_COMMIT_BRANCH == 'main'
    - if: $CI_COMMIT_BRANCH == 'dev'

