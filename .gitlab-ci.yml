deploy-to-pypi:
  stage: deploy
  image: ghcr.io/astral-sh/uv:python$PYTHON_VERSION-trixie
  dependencies:
    - build-package
  needs: [build-package, deploy-bump]
  environment: release
  id_tokens:
    PYPI_ID_TOKEN:
      aud: pypi
  before_script:
    - git pull
  script:
    - uv publish

deploy-to-testpypi:
  stage: deploy
  image: ghcr.io/astral-sh/uv:python$PYTHON_VERSION-trixie
  dependencies:
    - build-package
  needs: [build-package, deploy-bump-prerelease]
  environment: release
  id_tokens:
    PYPI_ID_TOKEN:
      aud: testpypi
  before_script:
    - git pull
  script:
    - uv publish --index testpypi

